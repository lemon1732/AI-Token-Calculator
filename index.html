<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Token Cost Calculator | AI Token 费用计算器</title>
  <meta name="description" content="Free AI API token cost calculator. Compare pricing across OpenAI GPT, Anthropic Claude, Google Gemini, and DeepSeek models. Calculate input, output, cache write and cache read costs instantly.">
  <meta name="keywords" content="AI API cost calculator, token pricing, GPT-5 pricing, Claude pricing, Gemini pricing, DeepSeek pricing, AI token费用计算器, API成本计算, 模型价格对比">
  <meta name="author" content="AI Token Calculator">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://tokencostcalc.com/">

  <!-- Open Graph -->
  <meta property="og:title" content="AI Token Cost Calculator | AI Token 费用计算器">
  <meta property="og:description" content="Free AI API token cost calculator. Compare pricing across OpenAI, Anthropic, Google, and DeepSeek models.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tokencostcalc.com/">
  <meta property="og:locale" content="en_US">
  <meta property="og:locale:alternate" content="zh_CN">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="AI Token Cost Calculator">
  <meta name="twitter:description" content="Free AI API token cost calculator. Compare pricing across GPT, Claude, Gemini, DeepSeek.">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "AI Token Cost Calculator",
    "alternateName": "AI Token 费用计算器",
    "description": "Free AI API token cost calculator for comparing pricing across OpenAI, Anthropic, Google, and DeepSeek models.",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "inLanguage": ["en", "zh"]
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
  <meta name="theme-color" content="#f5f0eb">
  <link rel="alternate" hreflang="en" href="https://tokencostcalc.com/?lang=en">
  <link rel="alternate" hreflang="zh" href="https://tokencostcalc.com/?lang=zh">
  <link rel="alternate" hreflang="x-default" href="https://tokencostcalc.com/">
</head>
<body>
  <div class="container">
    <header>
      <h1 data-i18n="title">AI Token Cost Calculator</h1>
      <button id="lang-toggle">中文</button>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="calculator" role="tab" aria-selected="true" data-i18n="tabCalculator">Cost Calculator</button>
      <button class="tab" data-tab="token-counter" role="tab" aria-selected="false" data-i18n="tabTokenCounter">Token Counter</button>
    </nav>

    <div class="card" id="calculator-panel" role="tabpanel">
      <div class="field">
        <label data-i18n="selectModel" for="model-select">Select Model</label>
        <select id="model-select"></select>
      </div>

      <div class="field">
        <label data-i18n="inputTokens">Input Tokens</label>
        <input type="text" id="input-tokens" inputmode="numeric" data-i18n-placeholder="placeholder_tokens" placeholder="e.g. 100000">
        <div class="price-hint" id="price-input"></div>
      </div>

      <div class="field">
        <label data-i18n="outputTokens">Output Tokens</label>
        <input type="text" id="output-tokens" inputmode="numeric" data-i18n-placeholder="placeholder_tokens" placeholder="e.g. 100000">
        <div class="price-hint" id="price-output"></div>
      </div>

      <div class="field">
        <label data-i18n="cacheWrite">Cache Write</label>
        <input type="text" id="cache-write" inputmode="numeric" data-i18n-placeholder="placeholder_tokens" placeholder="e.g. 100000" value="0">
        <div class="price-hint" id="price-cw"></div>
      </div>

      <div class="field">
        <label data-i18n="cacheRead">Cache Read</label>
        <input type="text" id="cache-read" inputmode="numeric" data-i18n-placeholder="placeholder_tokens" placeholder="e.g. 100000" value="0">
        <div class="price-hint" id="price-cr"></div>
      </div>

      <div class="divider"></div>

      <div class="results-header" data-i18n="costBreakdown">Cost Breakdown</div>

      <div class="result-row">
        <span class="label"><span data-i18n="inputCost">Input</span> (<span id="res-input-tokens">0</span> <span data-i18n="tokens">tokens</span>)</span>
        <span class="amount" id="res-input-cost">$0.00</span>
      </div>

      <div class="result-row">
        <span class="label"><span data-i18n="outputCost">Output</span> (<span id="res-output-tokens">0</span> <span data-i18n="tokens">tokens</span>)</span>
        <span class="amount" id="res-output-cost">$0.00</span>
      </div>

      <div class="result-row">
        <span class="label"><span data-i18n="cacheWriteCost">Cache Write</span> (<span id="res-cw-tokens">0</span> <span data-i18n="tokens">tokens</span>)</span>
        <span class="amount" id="res-cw-cost">$0.00</span>
      </div>

      <div class="result-row">
        <span class="label"><span data-i18n="cacheReadCost">Cache Read</span> (<span id="res-cr-tokens">0</span> <span data-i18n="tokens">tokens</span>)</span>
        <span class="amount" id="res-cr-cost">$0.00</span>
      </div>

      <div class="result-divider"></div>

      <div class="result-total">
        <span class="label" data-i18n="total">Total</span>
        <span class="amount" id="res-total">$0.00</span>
      </div>
    </div>

    <div class="card" id="token-counter-panel" role="tabpanel" hidden>
      <div class="field">
        <label data-i18n="selectModel" for="tc-model-select">Select Model</label>
        <select id="tc-model-select"></select>
      </div>

      <div class="field">
        <label data-i18n="inputText">Input Text</label>
        <textarea id="tc-input" rows="8" data-i18n-placeholder="placeholder_text" placeholder="Paste or type text..."></textarea>
      </div>

      <div class="divider"></div>

      <div class="tc-results" aria-live="polite">
        <div class="tc-row">
          <span class="tc-label" data-i18n="tokenCount">Token Count</span>
          <span class="tc-value" id="tc-token-count">0</span>
        </div>
        <div class="tc-row">
          <span class="tc-label" data-i18n="charCount">Character Count</span>
          <span class="tc-value" id="tc-char-count">0</span>
        </div>
      </div>

      <div class="tc-note" data-i18n="approxNote">* Non-OpenAI models are estimates</div>
    </div>

    <!-- FAQ Section for SEO long-tail keywords -->
    <section class="faq" id="faq-section" itemscope itemtype="https://schema.org/FAQPage">
      <h2 class="faq-title" data-i18n="faqTitle">FAQs</h2>
      <div id="faq-list"></div>
    </section>

    <footer>
      <span data-i18n="source">Source: Official websites</span>
      <span>|</span>
      <span data-i18n="updated">Updated: May 2026</span>
    </footer>
  </div>

  <script src="js/models.js?v=20260511"></script>
  <script src="js/i18n.js?v=20260511"></script>
  <script src="js/calculator.js?v=20260511"></script>
  <script src="js/token-counter.js?v=20260511"></script>
  <script src="js/app.js?v=20260511"></script>
</body>
</html>
